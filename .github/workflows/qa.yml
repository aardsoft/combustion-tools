on:
  push:
    branches:
      - main
      - combustion
  pull_request:
    branches:
      - main
      - combustion

name: Quality Assurance

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.87.0"
          components: rustfmt

      - name: fmt
        working-directory: combustion-tools/
        run: cargo fmt --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.87.0"
          components: clippy

      - name: clippy
        working-directory: combustion-tools/
        run: cargo clippy

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.87.0"

      - name: Run tests
        working-directory: combustion-tools/
        run: cargo test

  build:
    name: WASM test build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.87.0"

      - name: Install wasm-pack
        working-directory: combustion-tools/
        run: cargo install wasm-pack

      - name: Test if it builds for WASM
        working-directory: combustion-tools/
        run: wasm-pack build --target web
