<!DOCTYPE html>
<html lang="en-US">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>Aardsoft Combustion Image Generation</title>
</head>
<body>
	<h1>Aardsoft Combustion Image</h1>
	<p>Placeholder. This is just a proof of concept. It is not for general use.</p>
	<label for="rootKey">Paste your ssh public key here.
	You will be able to use this key to log in as root to the VM.</label>
	<p><textarea id="rootKey" rows="4" cols="80"></textarea></p>
	<hrule/>
	<input type="button" id="generateButton" value="Download image"/>
	<p id="errorMessage"/>
	<a id="downloadLink" download="combustion.img" hidden/>

	<script type="module">
		// pkg is generated by `wasm-pack build --target web`
		import init, { init_image, image_add_file } from './pkg/combustion_tools.js'; 
		init().then(() => {
			var button = document.getElementById('generateButton');
			button.addEventListener('click', (event) => {
				try {
					var image = init_image();
					var rootKeyString = document.getElementById("rootKey").value + '\n';
					var rootKey = new TextEncoder().encode(rootKeyString);
					image_add_file(image, "combustion/root_authorized_key", rootKey);
					var link = document.getElementById('downloadLink');
					var blob = new Blob([image], { type: 'application/octet-stream' });
					link.href = window.URL.createObjectURL(blob);
					link.click();
				} catch (e) {
					document.getElementById('errorMessage').innerHTML = e;
				}

			});
		});
	</script>
</body>
