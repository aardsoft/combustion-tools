<!DOCTYPE html>
<html lang="en-US">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>Combustion Image Generation</title>
	<link rel="stylesheet" href="main.css">
	<link rel="stylesheet" href="local.css">
</head>
<body>
	<h1 id="title">Combustion Image Generation</h1>
	<p id="description"></p>
	<label for="rootKey">Paste your ssh public key here.
	You will be able to use this key to log in as root to the VM.</label>
	<p><textarea id="rootKey" rows="4" cols="80"></textarea></p>
	<label for="rootFileSelect">Alternately, upload a file containing the authorized keys:</label>
	<p><input type="file" id="rootFileSelect"/></p>
	<p id="options"></p>
	<div id="settings"></div>
	<h2>Custom scripts</h2>
	<p id="customScripts"></p>
	<label for="customScript">You can include custom scripts in the image. They will be executed in alphabetical order.</label><br/>
	<input type="file" id="customScriptSelect"/>
	<hr/>
	<input type="button" id="generateButton" value="Download image" disabled/>
	<h1 id="jsBlocked">Please ensure Javascript is not blocked, in order to use this page.</h1>
	<p id="errorMessage"></p>
	<a id="downloadLink" download="combustion.img" hidden></a>

	<script>
		// Unblock the page if Javascript is working.
		// This is in a separate script section so that it loads fast.
		document.getElementById('jsBlocked').hidden = true;
		document.getElementById('generateButton').disabled = false;
	</script>

	<script>
		document.getElementById('rootFileSelect').addEventListener('change', readFile, false);
		rootFileContent = null;
		function readFile() {
			rootFileContent = null;
			const reader = new FileReader();
			reader.onload = (evt) => {
				rootFileContent = evt.target.result;
				document.getElementById('generateButton').disabled = false;
			}
			document.getElementById('generateButton').disabled = true;
			const file = document.getElementById('rootFileSelect').files[0]
			reader.readAsBinaryString(file);
		}
		var customScriptArray = new Array();
		document.getElementById('customScriptSelect').addEventListener('change', readScript, false);
		customScriptContent = null;
		function readScript() {
			customScriptContent = null;
			const reader = new FileReader();
			const file = document.getElementById('customScriptSelect').files[0]
			reader.onload = (evt) => {
				customScriptContent = evt.target.result;
				var m = new Map();
				m.set("name", file.name);
				m.set("content", customScriptContent);
				customScriptArray.push(m);
				renderCustomScripts();
			}
			reader.readAsBinaryString(file);
		}
		function renderCustomScripts() {
			customScriptArray.sort(function(a, b) {
				const nameA = a.get("name");
				const nameB = b.get("name");
				if (nameA < nameB) {
					return -1;
				}
				if (nameA > nameB) {
					return 1;
				}
				return 0;
			});
			newHTML = "";
			customScriptArray.forEach(function(script, i) {
				newHTML += "Include: " + script.get("name") + "<br/>";
			});
			document.getElementById('customScripts').innerHTML = newHTML;
		}
	</script>

	<script type="module">
		// pkg is generated by `wasm-pack build --target web`
		import init, { init_image, image_add_text_file, image_create_dir, substitute, parse_config } from './pkg/combustion_tools.js'; 
		await init();
		var button = document.getElementById('generateButton');
		button.addEventListener('click', async (event) => {
			try {
				var image = init_image();
				var imageFileName = "combustion";
				var rootKey = document.getElementById("rootKey").value;
				if (!rootKey && !rootFileContent) {
					throw new Error("Please fill in the root authorized key before generating the image.");
				}
				if (rootKey) {
					rootKey += '\n';
					image = image_add_text_file(image, "combustion/root_authorized_key", rootKey);
				}
				if (rootFileContent) {
					image = image_add_text_file(image, "combustion/root_authorized_key_file", rootFileContent);
				}

				for (const [i, option] of options.entries()) {
					if (document.getElementById("check_" + i).checked) {
						let filename = option.get("filename");
						let tag = option.get("tag");
						if (typeof tag !== "undefined") {
							imageFileName += "_" + tag;
						}
						let dir = option.get("preload") ? "before" : "after";
						let path = "combustion/scripts/" + dir;
						image = image_create_dir(image, "combustion/scripts");
						image = image_create_dir(image, path);
						let names = new Array();
						let values = new Array();
						let mandatory_missing = false;
						option.get("variables").forEach(function(variable, i) {
							let name = variable.get("name");
							let id = "setting_" + name;
							let field = document.getElementById(id);
							if (!variable.get("optional") && field.value === "") {
								mandatory_missing = variable.get("label");
							}
							names.push(name);
							values.push(field.value);
						});
						if (mandatory_missing !== false) {
							
							document.getElementById('errorMessage').innerHTML = `Error: ${mandatory_missing} must be filled in.`;
							return;
						}
						await fetch("scripts/" + filename)
							.then(result => {
								if (!result.ok) {
									throw "could not download script " + option.get("name") + ": " + result.status;
								}
								return result.text();
							})
							.then(text => image = image_add_text_file(image, path + "/" + filename, substitute(text, names, values))); 
					}
				}
				for (const [i, script] of customScriptArray.entries()) {
					let filename = script.get("name");
					let text = script.get("content");
					let path = "combustion/scripts/custom";
					image = image_create_dir(image, "combustion/scripts");
					image = image_create_dir(image, path);
					image = image_add_text_file(image, path + "/" + filename, text);
				}

				imageFileName += ".img";
				var link = document.getElementById('downloadLink');
				link.download = imageFileName;
				var blob = new Blob([image], { type: 'application/octet-stream' });
				link.href = window.URL.createObjectURL(blob);
				link.click();
			} catch (e) {
				document.getElementById('errorMessage').innerHTML = "Internal error: " + e;
			}
		});
		// load the page configuration
		let response = await fetch("./config.yaml");
		if (response.ok) {
			let config_yaml = await response.text();
			try {
				// load the page title and desciption
				let config = parse_config(config_yaml);
				document.getElementsByTagName("head")[0].getElementsByTagName("title")[0].innerHTML = config.get("title");
				document.getElementById("title").innerHTML = config.get("title");
				document.getElementById("description").innerHTML = config.get("description");

				// load the configurable options for the image
				var options = config.get("scripts");
				let elem = document.getElementById("options");
				let settings = document.getElementById("settings");
				let settings_empty = true;
				let settings_seen = new Map();
				if (options.length > 0) {
					elem.innerHTML += "<h2>Options</h2>";
				}
				options.forEach(function(option, i) {
					let check_id = "check_" + i;
					let name = option.get("name");
					elem.innerHTML += `<input type=\"checkbox\" id=\"${check_id}\"/><label for=\"${check_id}\">${name}</label><br/>`;
					option.get("variables").forEach(function(variable, i) {
						if (settings_empty) {
							settings.innerHTML += "<h2>Settings</h2>";
							settings_empty = false;
						}
						let name = variable.get("name");
						if (!settings_seen.has(name)) {
							let id = "setting_" + name;
							let p_id = "p_setting_" + name;
							let opt_class = variable.get("optional") ? "class=\"optional\"" : "class=\"mandatory\"";
							let opt_star = variable.get("optional") ? "" : "<span class=\"mandatory\">*</span>";
							let label = variable.get("label");
							let help = variable.get("help");
							settings_seen.set(name, true);
							settings.innerHTML += `<p id=\"${p_id}\" style=\"display:none\" ${opt_class}><label for=\"${name}\"${opt_class}> ${label}:${opt_star} </label><input type=\"text\" id=\"${id}\" disabled=yes><br/>${help}</p>`;
						}
					});
				});
				// This is done in a separate loop because updating the innerHTML
				// will wipe the previous event listeners.
				options.forEach(function(option, i) {
					let check_id = "check_" + i;
					let checkelem = document.getElementById(check_id);
					checkelem.addEventListener('input', function() {
						recalc_settings_enabled(options);
					});

				});
			} catch(e) {
				document.getElementById('errorMessage').innerHTML = "Internal error: " + e;
			}
		} else {
			var options = new Array();
		}
		function recalc_settings_enabled(options) {
			// First turn them all off, then turn on the ones used by checked scripts.
			// This makes it work when multiple scripts share the same variables.
			options.forEach(function(option, i) {
				option.get("variables").forEach(function(variable, i) {
					let name = variable.get("name");
					let id = "setting_" + name;
					let field = document.getElementById(id);
					let p_id = "p_setting_" + name;
					let p = document.getElementById(p_id);
					field.disabled = true;
					p.style.display = "none";
				});
			});
			options.forEach(function(option, i) {
				let check_id = "check_" + i;
				let checkelem = document.getElementById(check_id);
				option.get("variables").forEach(function(variable, i) {
					let name = variable.get("name");
					let id = "setting_" + name;
					let field = document.getElementById(id);
					let p_id = "p_setting_" + name;
					let p = document.getElementById(p_id);
					if (checkelem.checked) {
						field.disabled = false;
						p.style.display = "block";
					}
				});
			});
		}
	</script>
</body>
